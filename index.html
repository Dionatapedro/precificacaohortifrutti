    function arredondar(valor) {
      let inteiro = Math.floor(valor);
      let centavos = Math.round((valor - inteiro) * 100);
      let novo = Math.floor(centavos / 10) * 10 + 9;

      if (novo > 99) {
        inteiro++;
        novo = 9;
      }

      return (inteiro + novo / 100).toFixed(2);
    }

    function calcular(valor, peso, extra = 0) {
      if (!peso || peso === 0) {
        return { custo: "-", venda: "-", atacado: "-" }
      }

      let custo = valor / peso;

      // margem padrão 45%
      let vendaBase = custo * 1.45;

      // aplica extra (se existir)
      let vendaFinal = vendaBase * (1 + extra);

      let venda = arredondar(vendaFinal);
      let atacado = (valor * 1.4) / peso;

      return {
        custo: custo.toFixed(2).replace(".", ","),
        venda: venda.replace(".", ","),
        atacado: atacado.toFixed(2).replace(".", ",")
      }
    }

    const tabela = document.getElementById("tabela");

    produtos.forEach((p, i) => {
      let tr = document.createElement("tr");

      tr.innerHTML = `

    <td>${p.nome}</td>
    <td><input type="number"></td>
    <td id="c${i}">-</td>
    <td id="v${i}">-</td>
    <td id="a${i}">-</td>
    <td><button onclick="limparLinha(${i})">🗑</button></td>
  `;

      tabela.appendChild(tr);

      // ✅ PEGA O INPUT (ESSENCIAL)
      let input = tr.querySelector("input");

      // 🔄 CARREGAR ao abrir
      let salvo = localStorage.getItem("produto-" + i);

      if (salvo) {
        input.value = salvo;

        let r = calcular(parseFloat(salvo), p.peso);

        document.getElementById("c" + i).innerText = r.custo;
        document.getElementById("v" + i).innerText = r.venda;
        document.getElementById("a" + i).innerText = r.atacado;
      }

      // 💾 SALVAR ao digitar
      input.addEventListener("input", () => {
        let val = parseFloat(input.value);

        if (!val) {
          localStorage.removeItem("produto-" + i);
          return;
        }

        let r = calcular(val, p.peso, p.extra);

        document.getElementById("c" + i).innerText = r.custo;
        document.getElementById("v" + i).innerText = r.venda;
        document.getElementById("a" + i).innerText = r.atacado;

        localStorage.setItem("produto-" + i, val);
      });
    });

        l.style.display = nome.includes(termo) ? "" : "none";
      });
    });

    function limpar() {
      if (confirm("Deseja apagar todos os dados?")) {
        localStorage.clear();
        location.reload();
      }
    }

    function limparLinha(i) {
      if (!confirm("Limpar este item?")) return;

      // limpa input
      let input = document.querySelector(`#tabela tr:nth-child(${i + 1}) input`);
      input.value = "";

      // limpa valores
      document.getElementById("c" + i).innerText = "-";
      document.getElementById("v" + i).innerText = "-";
      document.getElementById("a" + i).innerText = "-";

      // remove do localStorage
      localStorage.removeItem("produto-" + i);
    }
    function gerarLista() {
      let lista = "";

      produtos.forEach((p, i) => {
        let codigo = p.codigo !== undefined ? p.codigo : "-";
        let input = document.querySelector(`#tabela tr:nth-child(${i + 1}) input`);

        // 👉 se quiser só os que foram preenchidos
        if (input.value) {
          lista += `${codigo} - ${p.nome}\n`;
        }

        // 👉 se quiser TODOS (usa isso no lugar do if)
        // lista += `${codigo} - ${p.nome}\n`;
      });

      if (!lista) {
        alert("Nenhum item preenchido!");
        return;
      }

      // copia automaticamente
      navigator.clipboard.writeText(lista);

      alert("Lista copiada!");
    }
